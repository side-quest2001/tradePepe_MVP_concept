services:
  postgres:
    image: postgres:16-alpine
    container_name: tradepepe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradepepe}
      POSTGRES_USER: ${POSTGRES_USER:-tradepepe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradepepe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tradepepe} -d ${POSTGRES_DB:-tradepepe}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradepepe-api
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tradepepe}
      POSTGRES_USER: ${POSTGRES_USER:-tradepepe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradepepe}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradepepe}:${POSTGRES_PASSWORD:-tradepepe}@postgres:5432/${POSTGRES_DB:-tradepepe}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run docker:dev

volumes:
  postgres_data:
